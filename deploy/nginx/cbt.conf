# Bare-metal / VM nginx site for the CBT backend (Laravel API).
# Install to /etc/nginx/sites-available/cbt.conf and symlink into sites-enabled,
# or drop into /etc/nginx/conf.d/. Adjust server_name, root, and the PHP-FPM
# socket to match the box. See DEPLOYMENT.md.

upstream cbt_fpm {
    # Match this to the pool's `listen` in cbt-pool.conf. Unix socket is fastest
    # on a single box; switch to 127.0.0.1:9000 if FPM runs over TCP.
    server unix:/run/php/php8.4-fpm.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;            # e.g. exams.example.com (online) or the LAN IP (offline)

    root /var/www/cbt/backend/public;
    index index.php;
    charset utf-8;

    client_max_body_size 25m;
    keepalive_timeout 65;
    sendfile on;
    tcp_nopush on;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript application/xml;

    # Security headers (defense-in-depth; the SPA sets its own on the app origin).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Enable when this site is served over TLS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass cbt_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
        fastcgi_read_timeout 60s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
