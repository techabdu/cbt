# Minimal Redis config for the CBT backend (cache, sessions, queue, locks).
# Install to /etc/redis/redis.conf (or include these lines) and restart redis.
# On the offline exam box, Redis runs locally and never leaves the LAN.

bind 127.0.0.1 -::1
port 6379
protected-mode yes

# The CBT queue must not silently drop jobs when memory is tight: never evict.
# (Cache entries are recomputed on miss, so noeviction is the safe default; size
# maxmemory to the box and monitor.)
maxmemory-policy noeviction
# maxmemory 1gb

# This is a cache/queue/session store, not a system of record — persistence is
# optional. Light AOF keeps queued (ungraded) jobs across a restart; drop both
# lines for a pure in-memory store.
appendonly yes
appendfsync everysec

tcp-keepalive 60
timeout 0
