; Bare-metal / VM PHP-FPM pool for the CBT backend.
; Install to /etc/php/8.4/fpm/pool.d/cbt.conf (Debian/Ubuntu) and reload php-fpm.
; Sizing: each worker ~40–60 MB → pm.max_children ≈ (RAM for PHP) / 60 MB.
; Keep MySQL max_connections ≥ (pm.max_children across all app nodes) + the
; queue worker pool + headroom (see DEPLOYMENT.md).
[cbt]
user = www-data
group = www-data

; Unix socket (fastest on a single box); must match the nginx upstream.
listen = /run/php/php8.4-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 48
pm.start_servers = 12
pm.min_spare_servers = 8
pm.max_spare_servers = 16
pm.max_requests = 500

request_terminate_timeout = 60s
clear_env = no
catch_workers_output = yes

; PHP overrides for this pool (mirror docker/php.ini / opcache.ini).
php_admin_value[memory_limit] = 512M
php_admin_value[upload_max_filesize] = 25M
php_admin_value[post_max_size] = 26M
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 256
php_admin_value[opcache.max_accelerated_files] = 20000
php_admin_value[opcache.validate_timestamps] = 0
