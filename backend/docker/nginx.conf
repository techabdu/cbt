# CBT backend site: serves Laravel's public/ and hands .php to PHP-FPM on
# 127.0.0.1:9000 (same container, managed by supervisor). Replaces the apt
# default site (removed in the Dockerfile).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /app/public;
    index index.php;
    charset utf-8;

    # Question-bank attachment uploads (keep in step with php post_max_size).
    client_max_body_size 25m;

    # Thousands of exam clients hold long keepalive connections.
    keepalive_timeout 65;
    sendfile on;
    tcp_nopush on;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml;

    # Security headers (defense-in-depth; the SPA sets its own on the app origin).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Enable when serving over TLS (terminate TLS at this server or a fronting proxy):
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
        fastcgi_read_timeout 60s;
    }

    # Never serve dotfiles (except ACME well-known).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
