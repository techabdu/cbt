# Main nginx config (replaces the Debian default). The stock file caps
# worker_connections at 768 — under the ~1000+ exam clients that each hold a
# keepalive connection (see keepalive_timeout in conf.d/default.conf), nginx
# would run out of connection slots before PHP-FPM saw a single request.
user www-data;
worker_processes auto;
worker_rlimit_nofile 16384;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    # Per worker. With worker_processes auto this comfortably covers thousands
    # of concurrent exam-hall browsers plus the FastCGI connections to FPM.
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    types_hash_max_size 2048;
    server_tokens off;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # The CBT site (gzip, keepalive, FastCGI buffers) lives in conf.d.
    include /etc/nginx/conf.d/*.conf;
}
