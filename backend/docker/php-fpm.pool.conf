; CBT PHP-FPM pool. Loaded after the base www.conf, so these directives win for
; the [www] pool. Sizing note: each worker holds ~40–60 MB, so
;   pm.max_children ≈ (RAM you give PHP) / 60 MB.
; The defaults below suit a ~4 GB app node; raise pm.max_children on bigger
; exam-hall boxes (and keep MySQL max_connections ≥ total children across nodes
; + the queue worker pool — see DEPLOYMENT.md).
[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 48
pm.start_servers = 12
pm.min_spare_servers = 8
pm.max_spare_servers = 16
; Recycle workers periodically to cap memory growth from long-lived processes.
pm.max_requests = 500

; A single exam request should never run a full minute; fail fast instead of
; pinning a worker.
request_terminate_timeout = 60s

; Pass the container/host environment (DB_*, REDIS_*, …) through to PHP.
clear_env = no
catch_workers_output = yes
decorate_workers_output = no
