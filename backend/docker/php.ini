; CBT PHP runtime overrides (loaded as conf.d/zz-cbt.ini, last wins).
; memory_limit is generous so the dompdf / maatwebsite-excel result exports of
; large cohorts don't OOM; request size matches the nginx client_max_body_size.
memory_limit = 512M
upload_max_filesize = 25M
post_max_size = 26M
max_execution_time = 60
expose_php = Off
