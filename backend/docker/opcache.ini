; OPcache — keeps compiled bytecode in shared memory so PHP doesn't re-parse the
; framework on every request. The single biggest per-request win under load.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=20000
; Code is baked into the image, so don't stat files for changes on every hit.
; (Local dev that edits code in place should use the manual dev servers, or
; rebuild the image — see README Option B.)
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.jit=1255
opcache.jit_buffer_size=128M

; Resolve framework paths from cache instead of hitting the filesystem.
realpath_cache_size=4096k
realpath_cache_ttl=600
