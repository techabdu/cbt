server {
    listen 80;
    root /var/www/html/public;
    index index.php;

    # Increase upload limit for question bank attachments
    client_max_body_size 20M;

    # API + health
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM via FastCGI
    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # Deny dot-files and composer artifacts
    location ~ /\.(?!well-known) {
        deny all;
    }
    location = /composer.json  { deny all; }
    location = /composer.lock  { deny all; }

    # Cache static assets
    location ~* \.(css|js|gif|ico|jpg|jpeg|png|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers (API only — frontend sets its own)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
