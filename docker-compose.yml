# CBT System — zero-config local stack
#
# USAGE (no setup required):
#   git clone <repo>
#   cd cbt
#   docker compose up --build
#
# Services:
#   MySQL 8   → localhost:3306
#   API (nginx → php-fpm) → http://localhost:8000
#   Frontend (Next.js)    → http://localhost:3000
#
# NOTE: All credentials below are development defaults.
#       Override via environment variables or a .env file before deploying
#       to a real server.

services:

  # ── MySQL 8 ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: cbt_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cbt_dev_root
      MYSQL_DATABASE: cbt_online
      MYSQL_USER: cbt_user
      MYSQL_PASSWORD: cbt_dev_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pcbt_dev_root"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # ── Laravel API (PHP-FPM) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cbt_backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      # APP_KEY is auto-generated by the entrypoint if left empty.
      # Sessions will reset on container restart — fine for local testing.
      # For a persistent key: docker compose exec backend php artisan key:generate --show
      # then add  APP_KEY: "base64:..."  here.
      APP_KEY: ""
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: cbt_online
      DB_USERNAME: cbt_user
      DB_PASSWORD: cbt_dev_pass
      FRONTEND_URL: http://localhost:3000
      SANCTUM_STATEFUL_DOMAINS: localhost:3000
      SANCTUM_TOKEN_EXPIRATION: 480
      IS_OFFLINE_SERVER: "false"
      # Shared with offline server for sync. Change in production.
      SYNC_SECRET_KEY: cbt_dev_sync_secret_change_in_prod
      SYNC_TIMEOUT: 30
      SYNC_RETRIES: 3
      LOG_CHANNEL: stderr
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx (FastCGI proxy for Laravel) ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cbt_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend/public:/var/www/html/public:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time — must be reachable from the browser.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: cbt_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

volumes:
  db_data:
