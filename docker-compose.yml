# Production-like Docker Compose for CBT System
# Usage:
#   1. Copy .env.docker to .env.docker.local and fill in secrets
#   2. docker compose --env-file .env.docker.local up --build
#
# Services:
#   db       → MySQL 8.0   (port 3306)
#   backend  → PHP-FPM     (internal only)
#   nginx    → Nginx       (port 8000) – proxies API to php-fpm
#   frontend → Next.js     (port 3000)

services:

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: cbt_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-cbt_root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-cbt_online}
      MYSQL_USER: ${DB_USERNAME:-cbt_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cbt_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-cbt_root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Laravel API (PHP-FPM) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cbt_backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-cbt_online}
      DB_USERNAME: ${DB_USERNAME:-cbt_user}
      DB_PASSWORD: ${DB_PASSWORD:-cbt_pass}
      FRONTEND_URL: http://localhost:3000
      SANCTUM_STATEFUL_DOMAINS: localhost:3000
      SANCTUM_TOKEN_EXPIRATION: 480
      IS_OFFLINE_SERVER: false
      SYNC_SECRET_KEY: ${SYNC_SECRET_KEY}
      SYNC_TIMEOUT: 30
      SYNC_RETRIES: 3
      LOG_CHANNEL: stderr
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage

  # ── Nginx (serves Laravel via FastCGI) ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cbt_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend/public:/var/www/html/public:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: cbt_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

volumes:
  db_data:
  backend_storage:
